services:
  moneyprinterturbo-dev-api:
    build:
      context: ${MPT_REPO_DIR:-/mnt/data/repos/MoneyPrinterTurbo-openai-tts}
      dockerfile: Dockerfile
    container_name: moneyprinterturbo-dev-api
    restart: unless-stopped
    ports:
      - "8089:8080"
    environment:
      - TZ=$TZ
      - PYTHONUNBUFFERED=1
      - PUID=$PUID
      - PGID=$PGID
      - MPT_MODE=dev
      - ENABLE_PROFILING=true
    volumes:
      - ${MPT_REPO_DIR:-/mnt/data/repos/MoneyPrinterTurbo-openai-tts}:/MoneyPrinterTurbo
      - $DOCKERDIR/appdata/moneyprinterturbo-dev/config/config.toml:/MoneyPrinterTurbo/config.toml
      - /mnt/data/storage:/MoneyPrinterTurbo/storage
      - moneyprinterturbo-cache:/root/.cache
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    command: ["uvicorn", "app.asgi:app", "--host=0.0.0.0", "--port=8080"]
    networks:
      - moneyprinter

  moneyprinterturbo-dev-webui:
    build:
      context: ${MPT_REPO_DIR:-/mnt/data/repos/MoneyPrinterTurbo-openai-tts}
      dockerfile: Dockerfile
    container_name: moneyprinterturbo-dev-webui
    restart: unless-stopped
    ports:
      - "8502:8501"
    environment:
      - TZ=$TZ
      - PYTHONUNBUFFERED=1
      - PUID=$PUID
      - PGID=$PGID
      - MPT_MODE=dev
      - MPT_API_BASE_URL=http://192.168.0.116:8089
      - MPT_PUBLIC_API_BASE_URL=http://192.168.0.116:8089
    volumes:
      - ${MPT_REPO_DIR:-/mnt/data/repos/MoneyPrinterTurbo-openai-tts}:/MoneyPrinterTurbo
      - $DOCKERDIR/appdata/moneyprinterturbo-dev/config/config.toml:/MoneyPrinterTurbo/config.toml
      - /mnt/data/storage:/MoneyPrinterTurbo/storage
      - moneyprinterturbo-cache:/root/.cache
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501').read()"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    depends_on:
      moneyprinterturbo-dev-api:
        condition: service_healthy
    command: ["streamlit", "run", "./webui/Main.py", "--server.address=0.0.0.0", "--server.port=8501", "--server.enableCORS=True", "--browser.gatherUsageStats=False"]
    networks:
      - moneyprinter

volumes:
  moneyprinterturbo-cache:
    name: moneyprinterturbo-dev-cache

networks:
  moneyprinter:
    driver: bridge
