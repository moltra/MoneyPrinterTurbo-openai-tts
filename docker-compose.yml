x-common-volumes: &common-volumes
  - ./:/MoneyPrinterTurbo

x-common-environment: &common-environment
  TZ: ${TZ:-UTC}
  PUID: ${PUID:-1000}
  PGID: ${PGID:-1000}

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: "moneyprinterturbo-api"
    security_opt:
      - no-new-privileges:true
    restart: always
    ports:
      - "8080:8080"
    environment:
      <<: *common-environment
    volumes: *common-volumes
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    command: [ "python3", "main.py" ]

  webui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: "moneyprinterturbo-webui"
    security_opt:
      - no-new-privileges:true
    restart: always
    ports:
      - "8501:8501"
    environment:
      <<: *common-environment
    volumes: *common-volumes
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    depends_on:
      api:
        condition: service_healthy
    command: [ "streamlit", "run", "./webui/Main.py","--browser.serverAddress=127.0.0.1","--server.enableCORS=True","--browser.gatherUsageStats=False" ]